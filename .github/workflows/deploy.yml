name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vps-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          BRANDJET_API_KEY: ${{ secrets.BRANDJET_API_KEY }}
          BRANDJET_WEBHOOK_SECRET: ${{ secrets.BRANDJET_WEBHOOK_SECRET }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 15m
          script_stop: true
          envs: BRANDJET_API_KEY,BRANDJET_WEBHOOK_SECRET,ADZUNA_APP_ID,ADZUNA_APP_KEY,NEWSAPI_KEY
          script: |
            cd /var/www/thermashift || exit 1
            ENV_FILE=/var/www/thermashift/.env
            [ -f "$ENV_FILE" ] || touch "$ENV_FILE"
            echo "🔐 Syncing env secrets to .env (upsert)..."
            sed -i '/^BRANDJET_API_KEY=/d;/^BRANDJET_API_BASE=/d;/^BRANDJET_WEBHOOK_SECRET=/d;/^ADZUNA_APP_ID=/d;/^ADZUNA_APP_KEY=/d;/^NEWSAPI_KEY=/d' "$ENV_FILE"
            { [ -n "$BRANDJET_API_KEY" ] && echo "BRANDJET_API_KEY=$BRANDJET_API_KEY" >> "$ENV_FILE" && echo "  + BRANDJET_API_KEY"; } || echo "  ⊘ BRANDJET_API_KEY (empty)"
            echo "BRANDJET_API_BASE=https://api.brandjet.ai" >> "$ENV_FILE" && echo "  + BRANDJET_API_BASE"
            { [ -n "$BRANDJET_WEBHOOK_SECRET" ] && echo "BRANDJET_WEBHOOK_SECRET=$BRANDJET_WEBHOOK_SECRET" >> "$ENV_FILE" && echo "  + BRANDJET_WEBHOOK_SECRET"; } || echo "  ⊘ BRANDJET_WEBHOOK_SECRET (empty)"
            { [ -n "$ADZUNA_APP_ID" ] && echo "ADZUNA_APP_ID=$ADZUNA_APP_ID" >> "$ENV_FILE" && echo "  + ADZUNA_APP_ID"; } || echo "  ⊘ ADZUNA_APP_ID (empty)"
            { [ -n "$ADZUNA_APP_KEY" ] && echo "ADZUNA_APP_KEY=$ADZUNA_APP_KEY" >> "$ENV_FILE" && echo "  + ADZUNA_APP_KEY"; } || echo "  ⊘ ADZUNA_APP_KEY (empty)"
            { [ -n "$NEWSAPI_KEY" ] && echo "NEWSAPI_KEY=$NEWSAPI_KEY" >> "$ENV_FILE" && echo "  + NEWSAPI_KEY"; } || echo "  ⊘ NEWSAPI_KEY (empty)"
            chmod 600 "$ENV_FILE"
            echo "🔄 Pulling latest code..."
            git fetch origin main || exit 1
            git reset --hard origin/main || exit 1
            echo "📦 Installing dependencies..."
            npm install --no-audit --no-fund || exit 1
            echo "🛠 Building frontend..."
            npm run build || exit 1
            echo "♻️  Restarting backend (clean reload — kills both legacy 'thermashift' and 'chat-proxy' names)..."
            pm2 delete chat-proxy thermashift 2>/dev/null || true
            pm2 start server/chat-proxy.js --name chat-proxy --update-env
            pm2 save 2>/dev/null || true
            sleep 3
            echo "🔎 Verifying backend is up..."
            pm2 status chat-proxy
            PORT=$(grep -E "^PORT=" .env | cut -d= -f2)
            PORT=${PORT:-3001}
            echo "🩺 Health check on http://localhost:$PORT/api/brandjet/webhook"
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:$PORT/api/brandjet/webhook -H 'Content-Type: application/json' -d '{"type":"deploy.healthcheck"}')
            echo "  → HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" != "200" ]; then
              echo "❌ Deploy verification failed — endpoint returned $HTTP_CODE"
              pm2 logs chat-proxy --lines 20 --nostream
              exit 1
            fi
            echo "✅ Deployed $(git rev-parse --short HEAD) at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
