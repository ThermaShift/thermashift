name: Push Top Leads to BrandJet

on:
  workflow_dispatch:
    inputs:
      buckets:
        description: 'Comma-separated bucket filter'
        required: false
        default: 'HOT,WARM'
      max:
        description: 'Max leads to push'
        required: false
        default: '15'
      list_name:
        description: 'BrandJet lead list name (NEW list will be created)'
        required: false
        default: 'ThermaShift Intent'

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 5m
          script: |
            cd /var/www/thermashift
            export BUCKETS='${{ inputs.buckets }}'
            export MAX_LEADS='${{ inputs.max }}'
            export LIST_NAME='${{ inputs.list_name }}'
            node -e "
              const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1cWtsdGhycHZzcXllbGZqb29kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNzYxOTksImV4cCI6MjA5MDY1MjE5OX0.xWWKByjiASSOC9QqhHdj2M8NkifsjJhXrFBYmpeXVH4';
              async function sb(table, method, body, query='') {
                const r = await fetch('https://auqklthrpvsqyelfjood.supabase.co/rest/v1/'+table+query, {
                  method, headers: {
                    'apikey': SUPABASE_KEY, 'Authorization': 'Bearer '+SUPABASE_KEY,
                    'Content-Type': 'application/json', 'Prefer': 'return=representation',
                  }, body: body ? JSON.stringify(body) : undefined
                });
                if (!r.ok) throw new Error(table+': '+r.status+' '+await r.text());
                const t = await r.text(); return t ? JSON.parse(t) : null;
              }
              const BUCKETS = (process.env.BUCKETS || 'HOT,WARM').split(',');
              const MAX = parseInt(process.env.MAX_LEADS) || 15;
              const LIST = (process.env.LIST_NAME || 'ThermaShift Intent') + ' ' + new Date().toISOString().slice(0,10);

              // Skip the hyperscalers + recruiters + cooling vendors (they're not buyers)
              const SKIP_COMPANIES = new Set([
                'Google','Oracle','Amazon','Microsoft','Apple','Meta','IBM',
                'Insight Global','Liberty Personnel Services,','Liberty Personnel Services',
                'Vertiv Group','Johnson Controls','Trane Technologies','Schneider Electric',
                'Delta Electronics',
                'CBRE','Jacobs',
              ]);

              (async () => {
                const mod = await import('./server/brandjet-mcp.js');
                mod.configureMcp(sb);

                const filter = BUCKETS.map(b => 'bucket.eq.'+b).join(',');
                // Pull more than we need, then filter out blocked companies and skip already-exported
                const rows = await sb('intent_companies', 'GET', null,
                  '?or=('+filter+')&status=neq.exported&order=score.desc&limit=' + (MAX * 4));

                const candidates = rows.filter(r => !SKIP_COMPANIES.has(r.company)).slice(0, MAX);
                if (!candidates.length) {
                  console.log('No new candidates (all top scorers already exported or blocked).');
                  return;
                }
                console.log('Selected', candidates.length, 'mid-market leads:');
                candidates.forEach((c, i) => console.log('  ' + (i+1) + '. [' + c.bucket + ' ' + c.score + '] ' + c.company));

                // 1. Create the list
                console.log();
                console.log('Creating BrandJet lead list:', LIST);
                const listId = await mod.createLeadList(LIST);
                if (!listId) { console.error('Failed to extract leadListId'); process.exit(1); }
                console.log('  ✓ List ID:', listId);

                // 2. Push each lead
                console.log();
                console.log('Pushing leads...');
                let ok = 0, failed = 0;
                for (const c of candidates) {
                  try {
                    // BrandJet 'name' field is required (the lead's PERSONAL name). We don't have a
                    // contact yet — use company name as a placeholder, real names will come once we
                    // add Apollo Free enrichment.
                    await mod.addLead({
                      leadListId: listId,
                      name: c.company,    // placeholder until enrichment
                      customVariables: {
                        company: c.company,
                        country: (c.country || 'us').toUpperCase(),
                        thermashift_score: c.score,
                        thermashift_bucket: c.bucket,
                        signal_summary: (c.signal_summary || '').slice(0, 300),
                      },
                    });
                    console.log('  ✓ Added:', c.company);
                    await sb('intent_companies', 'PATCH',
                      { status: 'exported', exported_at: new Date().toISOString(), updated_at: new Date().toISOString() },
                      '?id=eq.'+c.id);
                    ok++;
                  } catch (e) {
                    console.log('  ✗', c.company, '—', e.message.slice(0, 200));
                    failed++;
                  }
                }

                console.log();
                console.log('=== Summary ===');
                console.log('Pushed:', ok, '/ Failed:', failed);
                console.log('List ID:', listId);
                console.log('List name:', LIST);
              })().catch(e => { console.error('FATAL:', e.message); process.exit(1); });
            "
