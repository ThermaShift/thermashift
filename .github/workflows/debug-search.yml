name: Debug BrandJet Search

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 5m
          script: |
            cd /var/www/thermashift
            node -e "
              const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF1cWtsdGhycHZzcXllbGZqb29kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNzYxOTksImV4cCI6MjA5MDY1MjE5OX0.xWWKByjiASSOC9QqhHdj2M8NkifsjJhXrFBYmpeXVH4';
              async function sb(t,m,b,q='') {
                const r=await fetch('https://auqklthrpvsqyelfjood.supabase.co/rest/v1/'+t+q,{method:m,headers:{'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json','Prefer':'return=representation'},body:b?JSON.stringify(b):undefined});
                if(!r.ok)throw new Error(t+': '+r.status+' '+await r.text());
                const x=await r.text();return x?JSON.parse(x):null;
              }
              (async () => {
                const mcp = await import('./server/brandjet-mcp.js');
                mcp.configureMcp(sb);

                console.log('=== Test 1: companyName only, no title filter (people) ===');
                const r1 = await mcp.searchLeads({ companyName: 'Cologix', countryName: 'United States' });
                console.log('Result count:', (r1?.results || []).length);
                console.log('First 3 results:');
                (r1?.results || []).slice(0,3).forEach(p => console.log('  -', p.fullName, '|', p.jobTitle, '|', p.company, '| level:', p.jobLevel, '| email:', p.emailAvailable));
                console.log();

                console.log('=== Test 2: Single string jobTitle + countryName, no company ===');
                const r2 = await mcp.searchLeads({ jobTitle: 'Director of Data Center Operations', countryName: 'United States' });
                console.log('Result count:', (r2?.results || []).length);
                (r2?.results || []).slice(0,3).forEach(p => console.log('  -', p.fullName, '|', p.jobTitle, '|', p.company));
                console.log();

                console.log('=== Test 3: lead_finder searchType with array jobTitle ===');
                const r3 = await mcp.searchLeads({
                  jobTitle: ['Director of Data Center Operations','VP of Operations'],
                  countryName: 'United States'
                }, { searchType: 'lead_finder' });
                console.log('Result count:', (r3?.results || r3?.leads || []).length);
                console.log('Raw keys:', Object.keys(r3 || {}).join(', '));
                console.log('First 3:');
                (r3?.results || r3?.leads || []).slice(0,3).forEach(p => console.log('  -', p.fullName || p.full_name, '|', p.jobTitle || p.job_title, '|', p.company));
                console.log();

                console.log('=== Test 4: lead_finder by industry ===');
                const r4 = await mcp.searchLeads({
                  industry: 'Data Center',
                  jobLevel: 'VP',
                  countryName: 'United States',
                }, { searchType: 'lead_finder' });
                console.log('Result count:', (r4?.results || r4?.leads || []).length);
                (r4?.results || r4?.leads || []).slice(0,5).forEach(p => console.log('  -', p.fullName || p.full_name, '|', p.jobTitle || p.job_title, '@', p.company));
              })().catch(e => { console.error('FATAL:', e.message); console.error(e.stack); process.exit(1); });
            "
